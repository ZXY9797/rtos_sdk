description: Goodix GR5525 GPIO controller

compatible: "goodix,gr5525-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  label:
    type: string
    required: true

  ngpios:
    type: int
    required: true

gpio-cells:
  - pin
  - flags
