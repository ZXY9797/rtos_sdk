description: GD32 SPI controller

compatible: "gd,gd32-spi"

include: [spi-controller.yaml, base.yaml, pinctrl-device.yaml]

cxx-driver:
  template: Spi
  header: drivers/spi.h
  args:
    - node-reg
  device-base: true
  # GD32 SPI is a low-level bus/HAL driver. Devices on this bus can use
  # init-level: pre-kernel-3 to run after SPI and before OS services are available.
  init-level: pre-kernel-2
  # Default PRE_KERNEL_2 initcall priority for GD32 SPI instances.
  # A board DTS node may override this with:
  #   init-priority = <N>;
  # Lower values run earlier within the same init level.
  init-priority: 25
  init-cfg:
    type: SpiConfig
    fields:
      mode:
        default: 0
        cast: SpiMode
      clock_hz:
        prop: spi-max-frequency
        default: 1000000
      data_bits:
        default: 8

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  spi-max-frequency:
    type: int
    default: 1000000

  label:
    type: string
    required: true
