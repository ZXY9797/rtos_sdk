description: GD32 SPI controller

compatible: "gd,gd32-spi"

include: [spi-controller.yaml, base.yaml]

cxx-driver:
  template: Spi
  header: drivers/spi.h
  args:
    - node-reg
  init-cfg:
    type: SpiConfig
    fields:
      mode:
        default: 0
        cast: SpiMode
      clock_hz:
        prop: spi-max-frequency
        default: 1000000
      data_bits:
        default: 8

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  spi-max-frequency:
    type: int
    default: 1000000

  label:
    type: string
    required: true
