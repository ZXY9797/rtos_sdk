description: GD32 USART

compatible: "gd,gd32-usart"

include: [uart-controller.yaml, base.yaml]

cxx-driver:
  template: Uart
  header: drivers/uart.h
  readiness: device-base
  args:
    - node-reg
    - irq
  isr-handler: isr_handler
  device-base: true
  # GD32 USART is a low-level bus/HAL driver. It initializes before
  # PRE_KERNEL_3 dependent devices and before OS services are available.
  init-level: pre-kernel-2
  # Default PRE_KERNEL_2 initcall priority for GD32 USART instances.
  # A board DTS node may override this with:
  #   init-priority = <N>;
  # Lower values run earlier within the same init level.
  init-priority: 25
  init-cfg:
    type: UartConfig
    rx-buffer-size:
      default: 256
    fields:
      baudrate:
        prop: current-speed
        default: 115200
      data_bits:
        default: 8
        cast: DataBits
      stop_bits:
        default: 0
        cast: StopBits
      parity:
        default: 0
        cast: Parity

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  current-speed:
    type: int
    default: 115200

  label:
    type: string
    required: true
