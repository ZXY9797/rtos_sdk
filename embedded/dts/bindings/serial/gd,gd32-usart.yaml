description: GD32 USART

compatible: "gd,gd32-usart"

include: [uart-controller.yaml, base.yaml]

cxx-driver:
  template: Uart
  header: drivers/uart.h
  args:
    - node-reg
    - irq
  init-cfg:
    type: UartConfig
    rx-buffer-size:
      default: 256
    fields:
      baudrate:
        prop: current-speed
        default: 115200
      data_bits:
        default: 8
        cast: DataBits
      stop_bits:
        default: 0
        cast: StopBits
      parity:
        default: 0
        cast: Parity

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  current-speed:
    type: int
    default: 115200

  label:
    type: string
    required: true
