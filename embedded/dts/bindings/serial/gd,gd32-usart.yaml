description: GD32 USART

compatible: "gd,gd32-usart"

include: [uart-controller.yaml, base.yaml]

cxx-driver:
  template: Uart
  header: drivers/uart.h
  args:
    - node-reg
    - irq

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  current-speed:
    type: int
    default: 115200

  label:
    type: string
    required: true
