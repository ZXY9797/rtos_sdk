description: ARM Cortex-M7 CPU

compatible: "arm,cortex-m7"

include: arm,cortex-m.yaml

properties:
  i-cache-enabled:
    type: boolean
    description: |
      Enable instruction cache.

  d-cache-enabled:
    type: boolean
    description: |
      Enable data cache.