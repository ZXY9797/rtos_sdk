CONFIG_RTOS_FREERTOS=y
CONFIG_SOC_SERIES_GD32F50X=y
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=200000000
CONFIG_UART_GD32=y
CONFIG_SPI=y
CONFIG_SPI_GD32=y
CONFIG_DMA_GD32=y
CONFIG_XIP=y

# FOC Motor Control
CONFIG_PWM=y
CONFIG_PWM_GD32=y
CONFIG_ADC=y
CONFIG_ADC_GD32=y
CONFIG_FOC=y
CONFIG_FOC_PWM_FREQUENCY_HZ=20000
CONFIG_FOC_CLI_ENABLE=y

# CAN
CONFIG_CAN=y
CONFIG_CAN_GD32=y

# Flash + NVS
CONFIG_FLASH_GD32=y
CONFIG_NVS=y
